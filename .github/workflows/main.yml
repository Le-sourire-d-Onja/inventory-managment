name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
          | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Build image
        run: |
          docker build \
            -t ghcr.io/le-sourire-d-onja/inventory-managment:latest \
            .
      
      - name: Push image
        run: |
          docker push ghcr.io/le-sourire-d-onja/inventory-managment:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.OVH_SSH_HOST }} >> ~/.ssh/known_hosts
              
      - name: Deploy
        run: |
          ssh ${{ secrets.OVH_SSH_USER }}@${{ secrets.OVH_SSH_HOST }} << 'EOF'

            set -e

            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin      
            
            cd /srv/inventory-managment

            docker compose pull

            # Lance uniquement la DB si besoin
            docker compose up -d db

            # Run migrations
            docker compose run --rm web npx prisma migrate deploy

            # Démarrage final
            docker compose up -d

            # Nettoyage optionnel
            docker image prune -f

          EOF
